<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glassmorphism Scrollable UI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    background-image: url('https://wallpapercave.com/wp/wp14008680.jpg');
    background-size: cover;
    background-position: center;
    padding: 50px 20px;
  }

  .container {
    width: 90%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    align-items: center;
    border-radius: 15px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 8px 32px rgba(0,123,255,0.2);
    padding: 20px;
    max-height: 90vh;
    overflow-y: auto; /* Scrollable content */
    gap: 20px;
  }

  .container__img img {
    width: 100%;
    max-width: 400px;
    height: auto;
    border-radius: 12px;
    display: block;
  }

  .container__content {
    display: flex;
    flex-direction: column;
    color: #ffffff;
    width: 100%;
  }

  .container__content-title {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 12px;
    word-break: break-word;
  }

  .container__content-description {
    font-size: 16px;
    margin-bottom: 20px;
    line-height: 1.6;
    word-break: break-word;
  }

  .container__content-btn {
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: #fff;
    font-weight: 600;
    background: linear-gradient(135deg, #50b5f9, #007bff);
    box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
    transition: all 0.3s ease;
    align-self: flex-start;
  }

  .container__content-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0, 123, 255, 0.5);
  }

  /* Responsive */
  @media (max-width: 768px) {
    .container {
      max-height: 95vh;
      padding: 15px;
    }
    .container__content-btn {
      align-self: center;
    }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="container__img">
      <img src="https://i.pinimg.com/originals/39/32/11/3932118a8f3f1b8b0afea024c5678adc.jpg" alt="Gojo Satoru">
    </div>
    <div class="container__content" id="content">
      <h1 class="container__content-title">
        Gojo Satoru: Kuch, Sir va Cheksiz Imkoniyatlar
      </h1>
      <p class="container__content-description">
        Gojo Satoru – Jujutsu Kaisen anime qahramoni va eng kuchli sehrgar. Uning bolaligi, maxsus qobiliyatlari, Infinity texnikasi va janglardagi ustunligi haqida to‘liq ma’lumotni ushbu maqolada o‘qing.
      </p>
      <button class="container__content-btn" onclick="readMore()">Yana o'qish</button>
    </div>
  </div>

<script>
function readMore() {
  const innerHtml = `
    <h1 class="container__content-title">
      Gojo Satoru: Kuch, Sir va Cheksiz Imkoniyatlar
    </h1>
    <p class="container__content-description">
      Gojo Satoru – Jujutsu Kaisen anime qahramoni va eng kuchli sehrgar. Uning bolaligi, maxsus qobiliyatlari, Infinity texnikasi va janglardagi ustunligi haqida to‘liq ma’lumotni ushbu maqolada o‘qing.
    </p>
    <p class="container__content-description">
      Gojo Satoru — mashhur anime va manga qahramoni bo‘lib, u Jujutsu Kaisen asarining eng kuchli sehrgarlaridan biridir. U Tokio Jujutsu texnik maktabida o‘qituvchi sifatida faoliyat yuritadi. Gojo juda baland bo‘yli, oq sochli va ko‘k ko‘zli jozibali yigit sifatida tasvirlanadi. U odatda ko‘zlarini bog‘lab yuradi, chunki uning ko‘zlari juda kuchli energiyani boshqarish qobiliyatiga ega. Gojo o‘zining “Limitless” (Cheksizlik) texnikasi bilan mashhur. Ushbu texnika unga makon ustidan to‘liq nazorat qilish imkonini beradi.

Uning eng kuchli qobiliyatlaridan biri — “Infinity”, ya’ni unga yaqinlashayotgan har qanday hujumni to‘xtatib qo‘yish xususiyatidir. Gojo shuningdek “Six Eyes” qobiliyatiga ega bo‘lib, bu unga la’natlangan energiyani mukammal darajada ko‘rish va boshqarish imkonini beradi. U jang vaqtida nihoyatda sovuqqon va o‘ziga ishonchli ko‘rinadi. Ko‘pincha hazilkash va beparvo ko‘rinsa-da, u aslida juda aqlli va strategik fikrlovchi insondir.

Gojo o‘z shogirdlarini, xususan Yuji Itadori, Megumi Fushiguro va Nobara Kugisakini himoya qiladi. U yosh avlod sehrgarlarini kuchli qilib tarbiyalashni o‘z oldiga maqsad qilgan. Gojo jujutsu dunyosidagi eskicha va qat’iy qoidalarni yoqtirmaydi. U tizimni o‘zgartirishni va yangi, adolatli jamiyat yaratishni istaydi.

Uning eng mashhur kuchli hujumi — “Hollow Purple” bo‘lib, u nihoyatda vayronkor energiya to‘lqinini hosil qiladi. Bundan tashqari, uning “Domain Expansion” texnikasi “Unlimited Void” deb ataladi. Bu hudud ichiga tushgan dushman cheksiz ma’lumot oqimiga duch keladi va harakat qila olmay qoladi. Gojo ko‘plab kuchli la’natlangan ruhlar va dushmanlarga qarshi kurashgan.

Uning asosiy raqiblaridan biri — Ryomen Sukuna hisoblanadi. Gojo o‘zini “eng kuchli sehrgar” deb ataydi va ko‘pchilik ham buni tan oladi.
    </p>
    <button class="container__content-btn" onclick="readLess()">Kamroq o'qish</button>
  `;
  document.getElementById('content').innerHTML = innerHtml;
  document.getElementById('content').scrollIntoView({behavior: "smooth"});
}

function readLess() {
  const innerHtml = `
    <h1 class="container__content-title">
      Gojo Satoru: Kuch, Sir va Cheksiz Imkoniyatlar
    </h1>
    <p class="container__content-description">
      Gojo Satoru – Jujutsu Kaisen anime qahramoni va eng kuchli sehrgar. Uning bolaligi, maxsus qobiliyatlari, Infinity texnikasi va janglardagi ustunligi haqida to‘liq ma’lumotni ushbu maqolada o‘qing.
    </p>
    <button class="container__content-btn" onclick="readMore()">Yana o'qish</button>
  `;
  document.getElementById('content').innerHTML = innerHtml;
  document.getElementById('content').scrollIntoView({behavior: "smooth"});
}
</script>
</html>
